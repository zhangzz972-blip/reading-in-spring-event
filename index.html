<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书馆活动海报</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: sans-serif; }
        .bg {
            /* 这里的链接可以换成你自己的图片 */
            background-image: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f');
            height: 100%; background-position: center; background-repeat: no-repeat; background-size: cover;
            display: flex; align-items: center; justify-content: center; color: white; text-align: center;
        }
        .content { background: rgba(0,0,0,0.6); padding: 40px; border-radius: 15px; }
        .btn { background-color: #f44336; color: white; padding: 15px 32px; text-decoration: none; display: inline-block; font-size: 18px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="bg">
        <div class="content">
            <h1>📖 春天里的阅读</h1>
            <p>时间：2026年4月</p>
            <p>地点：市图书馆二楼外借部 四楼综合阅览部</p>
            <a href="#" class="btn">无需预约报名</a>
        </div>
    </div>
</body>
</html>
